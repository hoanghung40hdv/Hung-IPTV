name: Tu dong kiem tra IPTV song chet

on:
  schedule:
    # Hẹn giờ chạy tự động: 7h00 sáng Việt Nam mỗi ngày
    - cron: '0 0 * * *'
  
  # Giúp bạn có thể bấm nút "Chạy thủ công" bất kỳ lúc nào
  workflow_dispatch:

jobs:
  check-iptv:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy code từ kho lưu trữ về máy ảo
    - name: Checkout repository
      uses: actions/checkout@v4

    # Bước 2: Cài đặt môi trường Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Bước 3: Chạy file script kiểm tra tất cả các list kênh
    - name: Run IPTV Checker
      run: python checker.py

    # Bước 4: Tự động gom tất cả file kết quả có tên bắt đầu bằng "live" để lưu lên GitHub
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Gom tất cả các file có đuôi .m3u bắt đầu bằng chữ live
        git add live*.*
        
        # Kiểm tra nếu có thay đổi thì mới tiến hành commit, sửa 'print' thành 'echo' để hết lỗi sh
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Auto-update: Cap nhat cac list IPTV sach"
          git push
        else
          echo "Khong co thay doi nao de cap nhat."
        fi
