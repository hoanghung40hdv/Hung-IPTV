name: Tu dong kiem tra IPTV song chet

on:
  schedule:
    # Hẹn giờ chạy tự động: 0h00 sáng UTC = 7h00 sáng Việt Nam mỗi ngày
    - cron: '0 0 * * *'
  
  # Giúp bạn có thể bấm nút "Chạy thủ công" bất kỳ lúc nào bạn muốn
  workflow_dispatch:

jobs:
  check-iptv:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy code từ kho lưu trữ về máy ảo
    - name: Checkout repository
      uses: actions/checkout@v4

    # Bước 2: Cài đặt môi trường Python (Đã sửa lỗi chính tả ở đây)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Bước 3: Chạy file script kiểm tra link
    - name: Run IPTV Checker
      run: python checker.py

    # Bước 4: Tự động cập nhật file live.m3u mới ngược trở lại GitHub
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add live.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Loc link IPTV sach" && git push)
